# CERG Machine-Readable Artifact Governance
# This file governs YAML/JSON artifacts in this directory.
# Markdown corpus is authoritative where a Markdown source exists.
# Companion schema files are maintained as machine-readable artifacts and should be
# synchronized with the Markdown corpus when related source documents change.

artifact_governance_defaults:
  owner: Governance Pillar Leader (Document Control)
  generated_date: '2026-06-14'
  governance_note: If a machine-readable artifact and an authoritative Markdown source disagree, the Markdown source wins. Regenerated files should not be hand-edited except through their generator or source schema.

