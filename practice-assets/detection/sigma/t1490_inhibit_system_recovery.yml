title: Inhibit System Recovery - T1490
id: d3442e05-6abc-4830-8d05-fb087347fb8b
status: experimental
description: Detects attempts to delete volume shadow copies or disable system recovery (ransomware precursor) based on CERG Detection Engineering Framework
references:
  - https://attack.mitre.org/techniques/T1490/
author: CERG Detection Engineering Team
date: 2026-06-30
modified: 2026-06-30
tags:
  - attack.t1490
  - attack.inhibit_system_recovery
  - attack.impact
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'vssadmin delete shadows'
      - 'wmic shadowcopy delete'
      - 'bcdedit /set {default} recoveryenabled No'
      - 'wbadmin delete catalog'
  condition: selection
falsepositives:
  - 'IT administrators reclaiming disk space'
  - 'Scripted cleanup routines'
level: critical
