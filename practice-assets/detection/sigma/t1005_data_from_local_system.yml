title: Data from Local System - T1005
id: 586dd082-2796-46dd-89a4-b5eeb7266d66
status: experimental
description: Detects bulk file access from user profile directories by non-explorer processes indicating data collection based on CERG Detection Engineering Framework
references:
  - https://attack.mitre.org/techniques/T1005/
author: CERG Detection Engineering Team
date: 2026-06-30
modified: 2026-06-30
tags:
  - attack.t1005
  - attack.data_from_local_system
  - attack.collection
logsource:
  category: file_event
  product: windows
detection:
  selection:
    ObjectName|contains:
      - '\Desktop\'
      - '\Documents\'
      - '\Downloads\'
  filter_explorer:
    ProcessName|endswith: '\explorer.exe'
  condition: selection and not filter_explorer
falsepositives:
  - 'Backups (OneDrive, Google Drive, Acronis)'
  - 'IT migration tools'
  - 'Antivirus scanning'
level: medium
