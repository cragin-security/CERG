title: Network Sniffing - T1040
id: 6173691b-18f4-490d-9d1c-5fde82d36cc6
status: experimental
description: Detects execution of common network sniffing and packet capture tools based on CERG Detection Engineering Framework
references:
  - https://attack.mitre.org/techniques/T1040/
author: CERG Detection Engineering Team
date: 2026-06-30
modified: 2026-06-30
tags:
  - attack.t1040
  - attack.network_sniffing
  - attack.credential-access
  - attack.discovery
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith:
      - '\tcpdump.exe'
      - '\wireshark.exe'
      - '\tshark.exe'
      - '\dumpcap.exe'
      - '\pktmon.exe'
      - '\windump.exe'
  selection_cli:
    CommandLine|contains:
      - ' -i '
      - ' promisc'
      - ' -P '
  condition: selection_img or selection_cli
falsepositives:
  - 'Network administrators performing legitimate packet analysis'
  - 'Threat hunting team's approved tools'
level: high
