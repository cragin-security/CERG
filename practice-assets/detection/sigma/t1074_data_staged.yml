title: Data Staged - T1074
id: 73f22a7a-c05c-4f15-95c8-91f581402528
status: experimental
description: Detects archive tools compressing data from user profile directories as staging before exfiltration based on CERG Detection Engineering Framework
references:
  - https://attack.mitre.org/techniques/T1074/
author: CERG Detection Engineering Team
date: 2026-06-30
modified: 2026-06-30
tags:
  - attack.t1074
  - attack.data_staged
  - attack.collection
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith:
      - '\7z.exe'
      - '\rar.exe'
      - '\winrar.exe'
      - '\zip.exe'
  selection_dir:
    CommandLine|contains:
      - '\Users\'
      - '\Desktop\'
      - '\Documents\'
  condition: selection_img and selection_dir
falsepositives:
  - 'User manually backing up documents to archives'
  - 'IT migration creating backups'
  - 'Archival tools'
level: high
