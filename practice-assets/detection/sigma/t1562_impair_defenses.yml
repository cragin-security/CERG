title: Impair Defenses - T1562
id: 78c9d86e-82c4-4393-ad01-bcea4e993797
status: experimental
description: Detects attempts to disable Windows Defender real-time monitoring or other security controls based on CERG Detection Engineering Framework
references:
  - https://attack.mitre.org/techniques/T1562/
author: CERG Detection Engineering Team
date: 2026-06-30
modified: 2026-06-30
tags:
  - attack.t1562
  - attack.impair_defenses
  - attack.defense-evasion
  - attack.t1562.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
      - 'Set-MpPreference'
      - 'DisableRealtimeMonitoring'
      - 'true'
  condition: selection
falsepositives:
  - 'IT administering defender policies via script'
  - 'GPO application reconfiguring settings'
level: critical
