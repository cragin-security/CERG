title: Exfiltration Over Web Service - T1567
id: 662012ea-8975-4651-93bc-22375418d6ae
status: experimental
description: Detects large data uploads to common web storage and file sharing services indicating exfiltration based on CERG Detection Engineering Framework
references:
  - https://attack.mitre.org/techniques/T1567/
author: CERG Detection Engineering Team
date: 2026-06-30
modified: 2026-06-30
tags:
  - attack.t1567
  - attack.exfiltration_over_web_service
  - attack.exfiltration
logsource:
  category: network_connection
  product: windows
detection:
  selection:
    DestinationHostname|contains:
      - 'pastebin.com'
      - 'transfer.sh'
      - 'file.io'
      - 'dropbox.com'
      - 'drive.google.com'
  condition: selection
falsepositives:
  - 'Corporate cloud storage sync clients'
  - 'Developers uploading legitimate code'
level: high
