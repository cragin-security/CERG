title: Data Encrypted for Impact - T1486
id: 81f58ab6-b05f-4abc-b4a8-1f216dbd69f3
status: experimental
description: Detects file extensions commonly associated with ransomware encryption indicating data encrypted for impact based on CERG Detection Engineering Framework
references:
  - https://attack.mitre.org/techniques/T1486/
author: CERG Detection Engineering Team
date: 2026-06-30
modified: 2026-06-30
tags:
  - attack.t1486
  - attack.data_encrypted_for_impact
  - attack.impact
logsource:
  category: file_event
  product: windows
detection:
  selection:
    TargetFilename|endswith:
      - '.locked'
      - '.encrypted'
      - '.crypt'
      - '.wannacry'
      - '.cryptor'
  condition: selection
falsepositives:
  - 'User intentionally renaming files'
  - 'Legitimate encryption tools (BitLocker, EFS)'
  - 'Penetration testing exercises'
level: critical
